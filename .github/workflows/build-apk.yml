name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev libltdl-dev \
            ccache curl wget

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Cache ~/.buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # НОВЫЙ ШАГ: Автоматически принимаем все лицензии Android SDK
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "247a1c1766904d215a1d06a35503f2c190d68ff4\n28a585741f41dd4476c1e83e0d39e16bc923fae4\n84831b9409646a54c52f247a32130368d3a61441\n601085b94cd77f6b54012e2d17cf03cb32948c10\n33b6a2b64bc07aa5e485121d1d646f8d3c528807" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "8983081c3e52d198f1264be14d54175b304bc28d\ntcl-oauth" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          # Добавляем флаг автоматического согласия прямо в вызов buildozer
          buildozer yes android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SkyCollector-APK
          path: bin/*.apk
          if-no-files-found: error